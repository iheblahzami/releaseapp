name: CI/CD Pipeline

on:
  push:
    branches: [ "main" ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v3

      - name: Set up JDK 17
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run unit tests
        run: ./mvnw test

      - name: Package application
        run: ./mvnw clean package -DskipTests

      - name: Build Docker image
        run: docker build -t ${{ secrets.DOCKER_USERNAME }}/releaseapp:${{ github.sha }} .

      - name: Log in to Docker Hub
        uses: docker/login-action@v2
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Push Docker image
        run: docker push ${{ secrets.DOCKER_USERNAME }}/releaseapp:${{ github.sha }}

  update-gitops:
    runs-on: ubuntu-latest
    needs: build

    steps:
      # Step 1: Checkout GitOps repo
      - name: Checkout GitOps repository
        uses: actions/checkout@v3
        with:
          repository: iheblahzami/release-gitops
          token: ${{ secrets.GITOPS_PAT }}
          path: gitops

      # Step 2: Update deployment.yaml
      - name: Update image tag
        run: |
          sed -i "s|image: .*$|image: ${{ secrets.DOCKER_USERNAME }}/releaseapp:${{ github.sha }}|" gitops/deployment.yaml

      # Step 3: Commit and push
      - name: Commit and push changes
        run: |
          cd gitops
          git config user.name "iheblahzami"
          git config user.email "mohamediheb.lahzami@gmail.com"
          git add deployment.yaml
          git commit -m "Update image to ${{ github.sha }}"
          git push origin main
